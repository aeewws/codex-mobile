name: Bug report
description: Report a reproducible issue in Codex Mobile.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the issue.
    validations:
      required: true
  - type: input
    id: android_version
    attributes:
      label: Android version
      placeholder: "Example: Android 14"
    validations:
      required: true
  - type: input
    id: device_model
    attributes:
      label: Device model
      placeholder: "Example: Pixel 8"
    validations:
      required: true
  - type: input
    id: root_stack
    attributes:
      label: Root stack
      description: If relevant, note Magisk, KernelSU, or another setup.
      placeholder: "Example: Magisk 29.0"
  - type: input
    id: termux_version
    attributes:
      label: Termux version
      placeholder: "Example: 0.118.3"
  - type: input
    id: codex_package_version
    attributes:
      label: Codex package version inside Termux
      placeholder: "Example: @mmmbuto/codex-cli-termux@latest"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Connect to the backend
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste useful logs or attach screenshots if you have them.
