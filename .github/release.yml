changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: Breaking Changes 🛠
      labels:
        - breaking-change
    - title: Exciting New Features 🎉
      labels:
        - enhancement
        - feature
    - title: Bug Fixes 🐛
      labels:
        - bug
        - force-release
    - title: Maintenance 🏗
      labels:
        - chore
        - documentation
        - cleanup
    - title: Other Changes
      labels:
        - "*"
